plans:
  - name: Free
    description: Entry-level plan for getting started with the Airlabs API. Limited
      to 50 results per request on database endpoints and free tier fields only. No
      credit card required.
    url: https://airlabs.co/#Pricing
    price: 0.00
    currency: USD
    billingCycle: monthly
    rateLimit:
      requests: null
      period: null
      notes: Free tier has minute, hour, and monthly limits; specific numbers not
        published.
    features:
      - Real-time flights access
      - Airport, airline, city, route, fleet database access
      - 50 results per request on database endpoints
      - Core fields only (IATA/ICAO codes, coordinates, basic identifiers)
      - JSON response format

  - name: Starter
    description: Low-volume plan suitable for small projects and prototyping with
      10,000 API queries per month.
    url: https://airlabs.co/#Pricing
    price: 19.00
    currency: USD
    billingCycle: monthly
    rateLimit:
      requests: 10000
      period: monthly
      notes: Minute and hour sub-limits apply; exact values not publicly disclosed.
    features:
      - 10,000 queries per month
      - All endpoint access
      - Up to 500 results per request
      - Extended response fields
      - JSON, XML, and CSV response formats
      - Temporary signature authentication support

  - name: Growth
    description: Mid-volume plan for production applications requiring 100,000 API
      queries per month.
    url: https://airlabs.co/#Pricing
    price: 99.00
    currency: USD
    billingCycle: monthly
    rateLimit:
      requests: 100000
      period: monthly
      notes: Minute and hour sub-limits apply; exact values not publicly disclosed.
    features:
      - 100,000 queries per month
      - All endpoint access
      - Up to 500 results per request
      - Extended response fields
      - JSON, XML, and CSV response formats
      - Temporary signature authentication support

  - name: Scale
    description: High-volume plan for enterprise and large-scale aviation applications
      requiring 1,000,000 API queries per month.
    url: https://airlabs.co/#Pricing
    price: 499.00
    currency: USD
    billingCycle: monthly
    rateLimit:
      requests: 1000000
      period: monthly
      notes: Minute and hour sub-limits apply; exact values not publicly disclosed.
    features:
      - 1,000,000 queries per month
      - All endpoint access
      - Up to 500 results per request
      - Extended response fields
      - JSON, XML, and CSV response formats
      - Temporary signature authentication support
