paths:
  /flights:
    get:
      summary: Real-time flights
      description: Returns real-time positions and status of flights worldwide. Optional filters narrow the result set.
      tags:
      - Flights
      operationId: flights_flights
      parameters:
      - name: flight_iata
        in: query
        required: false
        description: Flight IATA code (e.g. AA100)
        schema:
          type: string
      - name: flight_icao
        in: query
        required: false
        description: Flight ICAO code (e.g. AAL100)
        schema:
          type: string
      - name: airline_iata
        in: query
        required: false
        description: Airline IATA code
        schema:
          type: string
      - name: airline_icao
        in: query
        required: false
        description: Airline ICAO code
        schema:
          type: string
      - name: dep_iata
        in: query
        required: false
        description: Departure airport IATA code
        schema:
          type: string
      - name: dep_icao
        in: query
        required: false
        description: Departure airport ICAO code
        schema:
          type: string
      - name: arr_iata
        in: query
        required: false
        description: Arrival airport IATA code
        schema:
          type: string
      - name: arr_icao
        in: query
        required: false
        description: Arrival airport ICAO code
        schema:
          type: string
      - name: flag
        in: query
        required: false
        description: Country ISO 2 code
        schema:
          type: string
      - name: hex
        in: query
        required: false
        description: ICAO 24-bit address (hex)
        schema:
          type: string
      - name: reg_number
        in: query
        required: false
        description: Aircraft registration number
        schema:
          type: string
