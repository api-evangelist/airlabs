openapi: 3.0.3
info:
  title: AirLabs Aviation Data Airlines Routes API
  description: Real-time global flight tracking, airport schedules, flight delays, airline and airport databases, aircraft fleets, routes, nearby airports, and autocomplete suggestions. All responses are JSON wrapped in a `{request, response}` envelope. Authentication via `api_key` query parameter.
  version: v9
  termsOfService: https://airlabs.co/terms
  contact:
    name: AirLabs
    url: https://airlabs.co
    email: info@airlabs.co
  license:
    name: Proprietary
    url: https://airlabs.co/terms
servers:
- url: https://airlabs.co/api/v9
  description: Production
security:
- ApiKeyAuth: []
tags:
- name: Routes
  description: Route reference data
paths:
  /routes:
    get:
      summary: Flight routes database
      description: Returns routes from the routes database. At least one filter parameter is recommended.
      tags:
      - Routes
      operationId: routes_routes
      parameters:
      - name: dep_iata
        in: query
        required: false
        description: Departure airport IATA
        schema:
          type: string
      - name: dep_icao
        in: query
        required: false
        description: Departure airport ICAO
        schema:
          type: string
      - name: arr_iata
        in: query
        required: false
        description: Arrival airport IATA
        schema:
          type: string
      - name: arr_icao
        in: query
        required: false
        description: Arrival airport ICAO
        schema:
          type: string
      - name: airline_iata
        in: query
        required: false
        description: Airline IATA
        schema:
          type: string
      - name: airline_icao
        in: query
        required: false
        description: Airline ICAO
        schema:
          type: string
      - name: flight_iata
        in: query
        required: false
        description: Flight IATA
        schema:
          type: string
      - name: flight_icao
        in: query
        required: false
        description: Flight ICAO
        schema:
          type: string
      - $ref: '#/components/parameters/FieldsParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesResponse'
        '400':
          description: Bad request — missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — plan limit reached or feature not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests — rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    RequestMeta:
      type: object
      description: Echo of the request and processing metadata
      properties:
        lang:
          type: string
        currency:
          type: string
        time:
          type: number
        id:
          type: string
        server:
          type: string
        host:
          type: string
        pid:
          type: integer
        version:
          type: integer
        method:
          type: string
        params:
          type: object
          additionalProperties: true
    Route:
      type: object
      properties:
        airline_iata:
          type: string
          description: Airline IATA code
        airline_icao:
          type: string
          description: Airline ICAO code
        flight_number:
          type: string
          description: Flight number
        flight_iata:
          type: string
          description: Flight IATA code
        flight_icao:
          type: string
          description: Flight ICAO code
        dep_iata:
          type: string
          description: Departure airport IATA code
        dep_icao:
          type: string
          description: Departure airport ICAO code
        dep_terminal:
          type: string
          description: Departure terminal
        dep_time:
          type: string
          description: Scheduled departure time (local)
        dep_time_utc:
          type: string
          description: Scheduled departure time (UTC)
        arr_iata:
          type: string
          description: Arrival airport IATA code
        arr_icao:
          type: string
          description: Arrival airport ICAO code
        arr_terminal:
          type: string
          description: Arrival terminal
        arr_time:
          type: string
          description: Scheduled arrival time (local)
        arr_time_utc:
          type: string
          description: Scheduled arrival time (UTC)
        duration:
          type: integer
          description: Flight duration in minutes
        days:
          type: array
          description: Days of week the route operates
          items:
            type: string
        cs_airline_iata:
          type: string
          description: Codeshare airline IATA code
        cs_flight_number:
          type: string
          description: Codeshare flight number
        cs_flight_iata:
          type: string
          description: Codeshare flight IATA code
    RoutesResponse:
      type: object
      properties:
        request:
          $ref: '#/components/schemas/RequestMeta'
        response:
          type: array
          items:
            $ref: '#/components/schemas/Route'
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              description: Error description
            code:
              type: string
              description: Error code
  parameters:
    LimitParam:
      name: _limit
      in: query
      required: false
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    FieldsParam:
      name: _fields
      in: query
      required: false
      description: Comma-separated list of response fields to return
      schema:
        type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
      description: API key. Sign up at https://airlabs.co/signup
externalDocs:
  description: Full documentation
  url: https://airlabs.co/docs/
